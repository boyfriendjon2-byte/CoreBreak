<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>THE FRACTURE | V0.6 - Build Completa</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-blue: #00ffff;
            --neon-purple: #ff00ff;
            --glitch-red: #ff003c;
        }

        body { 
            margin: 0; overflow: hidden; background: #000; 
            font-family: 'Orbitron', sans-serif; color: #fff; user-select: none; 
        }
        canvas { display: block; }

        /* --- PANTALLAS DE MENÚ --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fcf5c7 0%, #d4b581 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #333; z-index: 20;
        }
        
        #death-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(150,0,0,0.8); color: white; justify-content: center; 
            align-items: center; flex-direction: column; z-index: 30; 
        }

        .btn-container { display: flex; gap: 20px; margin-top: 30px; }
        .btn { 
            padding: 15px 30px; border: 3px solid #333; background: transparent; 
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn:hover { background: #333; color: #fcf5c7; transform: scale(1.05); }

        /* --- HUD PRINCIPAL --- */
        #ui { 
            position: absolute; bottom: 30px; left: 30px; 
            pointer-events: none; display: none; z-index: 10; 
        }

        /* Información del Jugador Glitch */
        .player-info { margin-left: 20px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        #player-name { 
            font-size: 24px; font-weight: 900; color: var(--neon-blue); 
            text-shadow: 2px 2px var(--glitch-red); animation: glitch-text 3s infinite; 
        }
        #skill-info { font-size: 12px; color: #aaa; margin-top: -5px; }

        /* Contenedor de la Barra de Salud con tu Imagen */
        .health-container {
            position: relative; width: 450px; height: 150px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 102, 0.3));
        }

        /* La imagen que subiste (El Marco) */
        .health-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Barra de salud futurista rota-Photoroom.jpg');
            background-size: contain; background-repeat: no-repeat;
            z-index: 3; /* Por encima del relleno */
        }

        /* El relleno verde de la vida */
        #health-fill {
            position: absolute;
            top: 48px; left: 65px; /* Ajuste para encajar en la imagen */
            width: 320px; height: 48px;
            background: linear-gradient(90deg, #00441b 0%, var(--neon-green) 50%, #adff2f 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 15px var(--neon-green);
            z-index: 2;
            transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28), background 0.3s;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        /* Contador de Balas */
        #ammo-ui {
            position: absolute; bottom: 40px; right: 50px;
            text-align: right; pointer-events: none; display: none; z-index: 10;
        }
        #ammo-counter {
            font-size: 50px; font-weight: 900; color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue); transition: color 0.2s;
        }

        /* Elementos en pantalla (Crosshair, Flash, Filtro) */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; 
            background: #fff; transform: translate(-50%, -50%); pointer-events: none; 
            display: none; border-radius: 50%; box-shadow: 0 0 8px var(--neon-blue); z-index: 10;
        }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 2px); pointer-events: none; z-index: 5; }
        #flash { position: fixed; top:0; left:0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.05s; z-index: 4; }

        @keyframes glitch-text {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); text-shadow: 2px 0 red; }
            2% { transform: translate(2px, -2px); text-shadow: -2px 0 blue; }
            3% { transform: translate(0); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 4em; margin-bottom: 0; text-shadow: 4px 4px 0px #fff;">[ LA FRACTURA ]</h1>
        <p style="letter-spacing: 5px; font-weight: bold;">SELECCIONA TU RECIPIENTE ECOLÓGICO</p>
        <div class="btn-container">
            <button class="btn" id="btn-kairos">⚡ KAIROS (Tryhard / Dash Daño)</button>
            <button class="btn" id="btn-noxar">👁️ NOXAR (Control / Pulso Área)</button>
        </div>
    </div>

    <div id="death-screen">
        <h1 style="font-size: 5em; text-shadow: 0 0 20px red;">BUCLE CORRUPTO</h1>
        <button class="btn" onclick="location.reload()" style="color:white; border-color:white;">REINTEGRARSE</button>
    </div>

    <div id="ui">
        <div class="player-info">
            <div id="player-name">SUJETO: ---</div>
            <div id="skill-info">HABILIDAD (Shift): <span id="skill-name">...</span></div>
        </div>
        <div class="health-container">
            <div id="health-fill"></div>
            <div class="health-frame"></div>
        </div>
    </div>
    
    <div id="ammo-ui">
        <div style="font-size: 14px; color: #aaa; letter-spacing: 2px;">NÚCLEO_ENERGÍA</div>
        <div id="ammo-counter">10 / 10</div>
    </div>

    <div id="crosshair"></div>
    <div id="flash"></div>
    <div id="overlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- SISTEMA DE VARIABLES ---
        let selectedCharacter = null, arenaLocked = false, isDead = false;
        let playerHP = 100, currentAmmo = 10;
        const MAX_AMMO = 10;
        let isReloading = false;
        const enemies = [], particles = [];
        
        // --- ESCENA Y CÁMARA ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xfcf5c7, 0.04); 
        scene.background = new THREE.Color(0xfcf5c7);

        const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(camera);

        // --- ARMA: REVÓLVER DE IMPULSO (Modelo Detallado V0.4) ---
        const gunGroup = new THREE.Group();
        const gunMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
        const energyColorKairos = 0x00ffff;
        const energyColorNoxar = 0xff00ff;
        
        const bodyGeo = new THREE.BoxGeometry(0.12, 0.18, 0.3);
        const body = new THREE.Mesh(bodyGeo, gunMaterial);
        
        const barrelGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.4, 8);
        barrelGeo.rotateX(Math.PI / 2);
        const barrel = new THREE.Mesh(barrelGeo, gunMaterial);
        barrel.position.set(0, 0.04, -0.25);
        
        const coreGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.15, 16);
        const coreMat = new THREE.MeshBasicMaterial({ color: energyColorKairos, transparent: true, opacity: 0.8 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.position.set(0, 0.04, -0.05);
        core.name = "energy_core";

        const gripGeo = new THREE.BoxGeometry(0.08, 0.25, 0.1);
        const grip = new THREE.Mesh(gripGeo, gunMaterial);
        grip.position.set(0, -0.15, 0.1);
        grip.rotation.x = -0.3;

        gunGroup.add(body, barrel, core, grip);
        gunGroup.position.set(0.35, -0.35, -0.6); 
        gunGroup.rotation.y = -0.1;
        camera.add(gunGroup);

        // --- ILUMINACIÓN ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const playerLight = new THREE.PointLight(0xffffff, 1, 20);
        scene.add(playerLight);

        // --- TEXTURAS PROCEDURALES ---
        function createProceduralTexture(size, type) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            if (type === 'safe_wall') {
                ctx.fillStyle = '#eadb9d'; ctx.fillRect(0, 0, size, size);
                ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
                for(let i=0; i<size; i+=32) {
                    for(let j=0; j<size; j+=32) {
                        ctx.beginPath(); ctx.moveTo(i, j); ctx.lineTo(i+16, j+16); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(i+16, j); ctx.lineTo(i, j+16); ctx.stroke();
                    }
                }
            } else if (type === 'safe_floor') {
                ctx.fillStyle = '#ccb07c'; ctx.fillRect(0, 0, size, size);
                for(let i=0; i<500; i++) {
                    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.1})`; ctx.fillRect(Math.random()*size, Math.random()*size, 4, 4);
                }
            } else if (type === 'arena_floor') {
                ctx.fillStyle = '#1a001a'; ctx.fillRect(0, 0, size, size);
                ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2;
                for(let i=0; i<size; i+=64) {
                    ctx.strokeRect(i, 0, 2, size); ctx.strokeRect(0, i, size, 2);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const safeWallTex = createProceduralTexture(512, 'safe_wall');
        const safeFloorTex = createProceduralTexture(512, 'safe_floor');
        const arenaFloorTex = createProceduralTexture(512, 'arena_floor');

        // --- MATERIALES ---
        const wallMatSafe = new THREE.MeshStandardMaterial({ map: safeWallTex, roughness: 0.9 }); 
        const floorMatSafe = new THREE.MeshStandardMaterial({ map: safeFloorTex, roughness: 1.0 });
        const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xeeebd6, roughness: 1.0 });

        const wallMatArena = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
        const floorMatArena = new THREE.MeshStandardMaterial({ map: arenaFloorTex, metalness: 0.6, roughness: 0.5 });
        floorMatArena.map.repeat.set(4, 4); 

        // --- CONSTRUCCIÓN DEL MUNDO ---
        function createRoom(w, h, d, x, y, z, floorMat, wallMat) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(w, d), floorMat); floor.rotation.x = -Math.PI / 2; group.add(floor);
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(w, d), ceilingMat); ceiling.rotation.x = Math.PI / 2; ceiling.position.y = h; group.add(ceiling);
            const wallL = new THREE.Mesh(new THREE.PlaneGeometry(d, h), wallMat); wallL.rotation.y = Math.PI / 2; wallL.position.set(-w/2, h/2, 0); group.add(wallL);
            const wallR = new THREE.Mesh(new THREE.PlaneGeometry(d, h), wallMat); wallR.rotation.y = -Math.PI / 2; wallR.position.set(w/2, h/2, 0); group.add(wallR);
            const wallF = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat); wallF.position.set(0, h/2, -d/2); group.add(wallF); 
            group.position.set(x, y, z); scene.add(group);
            return group;
        }

        createRoom(18, 5, 18, 0, 0, 0, floorMatSafe, wallMatSafe); // Habitación Segura
        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(18, 5), wallMatSafe); backWall.position.set(0, 2.5, 9); scene.add(backWall);
        
        createRoom(6, 4, 30, 0, 0, -24, floorMatSafe, wallMatSafe); // Pasillo

        const door = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 1), new THREE.MeshStandardMaterial({ color: 0x330000, metalness: 0.5 }));
        door.position.set(0, 2, -39.5); scene.add(door);

        createRoom(60, 15, 60, 0, -0.5, -70, floorMatArena, wallMatArena); // Arena

        // --- CONTROLES Y SELECCIÓN ---
        const controls = new PointerLockControls(camera, document.body);
        camera.position.set(0, 2, 5);

        document.getElementById('btn-kairos').onclick = () => startGame('KAIROS');
        document.getElementById('btn-noxar').onclick = () => startGame('NOXAR');

        function startGame(char) {
            selectedCharacter = char;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('ammo-ui').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            document.getElementById('player-name').innerText = `SUJETO: ${char}`;
            document.getElementById('skill-name').innerText = char === 'KAIROS' ? "DASH CORTANTE" : "PULSO DE VACÍO";
            
            const pColor = char === 'KAIROS' ? energyColorKairos : energyColorNoxar;
            coreMat.color.setHex(pColor);
            
            document.getElementById('player-name').style.color = char === 'KAIROS' ? "var(--neon-blue)" : "var(--neon-purple)";
            document.getElementById('crosshair').style.boxShadow = `0 0 8px ${char === 'KAIROS' ? 'var(--neon-blue)' : 'var(--neon-purple)'}`;

            updateHealthUI(); // Inicializar barra
            controls.lock();
        }

        // --- ACTUALIZAR UI VISUAL ---
        function updateHealthUI() {
            const fill = document.getElementById('health-fill');
            const maxWidth = 320; 
            const newWidth = (playerHP / 100) * maxWidth;
            
            fill.style.width = `${Math.max(0, newWidth)}px`;

            if(playerHP < 30) {
                fill.style.background = "linear-gradient(90deg, #440000 0%, #ff0000 50%, #ff5555 100%)";
                fill.style.boxShadow = "inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px #ff0000";
            } else {
                fill.style.background = "linear-gradient(90deg, #00441b 0%, var(--neon-green) 50%, #adff2f 100%)";
                fill.style.boxShadow = "inset 0 0 20px rgba(0,0,0,0.5), 0 0 15px var(--neon-green)";
            }
        }

        function updateAmmoUI() {
            const counter = document.getElementById('ammo-counter');
            counter.innerText = `${currentAmmo} / ${MAX_AMMO}`;
            if(currentAmmo <= 3) counter.style.color = "var(--glitch-red)";
            else counter.style.color = selectedCharacter === 'KAIROS' ? "var(--neon-blue)" : "var(--neon-purple)";
        }

        // --- SISTEMA DE PARTÍCULAS (SANGRE) ---
        function spawnBlood(position, count, isGlitch = false) {
            const color = isGlitch ? 0xff00ff : 0xaa0000; 
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: color, transparent: true }));
                p.position.copy(position);
                p.userData = {
                    velocity: new THREE.Vector3((Math.random()-0.5)*0.3, Math.random()*0.3, (Math.random()-0.5)*0.3),
                    gravity: 0.01, life: 1.0
                };
                scene.add(p); particles.push(p);
            }
        }

        // --- COMBATE ---
        const raycaster = new THREE.Raycaster();
        let canShoot = true;

        document.addEventListener('mousedown', () => {
            if(!controls.isLocked || isDead || !canShoot || isReloading) return;
            if (currentAmmo > 0) shoot();
            else { coreMat.opacity = 0.2; setTimeout(()=>coreMat.opacity=0.8, 100); }
        });

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyR' && currentAmmo < MAX_AMMO && !isReloading) reload();
        });

        function shoot() {
            canShoot = false; currentAmmo--; updateAmmoUI();
            
            // Recoil
            gunGroup.position.z += 0.08; gunGroup.rotation.x += 0.05;
            setTimeout(() => { gunGroup.position.z -= 0.08; gunGroup.rotation.x -= 0.05; }, 40);

            // Flash
            const f = document.getElementById('flash');
            f.style.background = selectedCharacter === 'KAIROS' ? 'cyan' : 'magenta';
            f.style.opacity = '0.2'; setTimeout(() => f.style.opacity = '0', 40);

            coreMat.color.setHex(0xffffff);
            setTimeout(() => coreMat.color.setHex(selectedCharacter === 'KAIROS' ? energyColorKairos : energyColorNoxar), 80);

            // Hitscan
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh));

            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;
                const enemyObj = enemies.find(e => e.mesh === intersects[0].object);
                if (enemyObj) takeDamage(enemyObj, 35, hitPoint); 
            }

            let fireRate = selectedCharacter === 'KAIROS' ? 120 : 250; 
            setTimeout(() => { canShoot = true; if (currentAmmo <= 0) reload(); }, fireRate);
        }

        function reload() {
            if(isReloading) return;
            isReloading = true;
            document.getElementById('ammo-counter').innerText = "REC...";
            document.getElementById('ammo-counter').style.color = "var(--glitch-red)";

            const tl = gunGroup.rotation; const tp = gunGroup.position;
            tp.y -= 0.2; tl.z += 0.5; tl.y -= 0.3; coreMat.opacity = 0.1;

            setTimeout(() => {
                tp.y += 0.2; tl.z -= 0.5; tl.y += 0.3; coreMat.opacity = 0.8;
                currentAmmo = MAX_AMMO; updateAmmoUI(); isReloading = false;
            }, 1200); 
        }

        function takeDamage(enemy, amount, hitPoint) {
            enemy.hp -= amount;
            spawnBlood(hitPoint, 8, selectedCharacter === 'NOXAR');
            
            enemy.mesh.material.color.setHex(0xffffff); enemy.mesh.scale.set(1.1, 1.1, 1.1);
            setTimeout(() => {
                if(enemy.mesh) { enemy.mesh.material.color.setHex(0xff0000); enemy.mesh.scale.set(1, 1, 1); }
            }, 80);

            if (enemy.hp <= 0) {
                spawnBlood(enemy.mesh.position, 20, selectedCharacter === 'NOXAR');
                scene.remove(enemy.mesh); enemies.splice(enemies.indexOf(enemy), 1);
            }
        }

        function damagePlayer(amount) {
            if(isDead) return;
            playerHP -= amount;
            updateHealthUI();
            
            const f = document.getElementById('flash'); f.style.background = 'red'; f.style.opacity = '0.4'; setTimeout(() => f.style.opacity = '0', 100);

            if (playerHP <= 0) {
                isDead = true; controls.unlock();
                document.getElementById('death-screen').style.display = 'flex';
                document.getElementById('ui').style.display = 'none'; document.getElementById('ammo-ui').style.display = 'none'; document.getElementById('crosshair').style.display = 'none';
            }
        }

        // --- MOVIMIENTO Y HABILIDADES ---
        let moveF = false, moveB = false, moveL = false, moveR = false;
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let isDashing = false;

        document.addEventListener('keydown', (e) => {
            if(!selectedCharacter) return;
            switch(e.code) {
                case 'KeyW': moveF = true; break; case 'KeyS': moveB = true; break; case 'KeyA': moveL = true; break; case 'KeyD': moveR = true; break;
                case 'ShiftLeft': useSkill(); break; 
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = false; break; case 'KeyS': moveB = false; break; case 'KeyA': moveL = false; break; case 'KeyD': moveR = false; break;
            }
        });

        function useSkill() {
            if(isReloading) return;
            if (selectedCharacter === 'KAIROS') {
                velocity.z -= 130; isDashing = true;
                coreMat.color.setHex(0xffffff);
                setTimeout(() => { isDashing = false; coreMat.color.setHex(energyColorKairos); }, 300);
            } else if (selectedCharacter === 'NOXAR') {
                const f = document.getElementById('flash'); f.style.background = 'magenta'; f.style.opacity = '0.5'; setTimeout(() => f.style.opacity = '0', 150);
                enemies.forEach(en => {
                    if (camera.position.distanceTo(en.mesh.position) < 15) {
                        en.mesh.position.y += 2; takeDamage(en, 40, en.mesh.position.clone()); 
                    }
                });
            }
        }

        function applyCollisions() {
            const pos = camera.position;
            if (pos.z > -9) { if (pos.x > 8.5) pos.x = 8.5; if (pos.x < -8.5) pos.x = -8.5; if (pos.z > 8.5) pos.z = 8.5; }
            else if (pos.z <= -9 && pos.z > -39) { if (pos.x > 2.5) pos.x = 2.5; if (pos.x < -2.5) pos.x = -2.5; }
            else if (pos.z <= -40) {
                if (pos.x > 29) pos.x = 29; if (pos.x < -29) pos.x = -29; if (pos.z < -99) pos.z = -99;
                if (pos.z > -41) pos.z = -41; 
            }
        }

        function checkEvents() {
            if (camera.position.z < -20 && camera.position.z > -39 && !arenaLocked) { if(door.position.y < 6) door.position.y += 0.2; }
            if (camera.position.z < -42 && !arenaLocked) {
                arenaLocked = true; door.position.y = 2;
                scene.fog.color.setHex(0x0a0000); scene.fog.density = 0.06; scene.background = new THREE.Color(0x050005);
                spawnEnemies();
            }
        }

        function spawnEnemies() {
            for(let i=0; i<12; i++) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.8, roughness: 0.1 }));
                mesh.position.set((Math.random() - 0.5) * 45, 1.5, -55 - (Math.random() * 35));
                scene.add(mesh);
                enemies.push({ mesh: mesh, hp: 100, speed: Math.random() * 3 + 2.5, lastAttack: 0 });
            }
        }

        // --- BUCLE PRINCIPAL ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked && !isDead) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveF) - Number(moveB); direction.x = Number(moveR) - Number(moveL); direction.normalize();

                const speed = selectedCharacter === 'KAIROS' ? 550.0 : 450.0;
                if (moveF || moveB) velocity.z -= direction.z * speed * delta;
                if (moveL || moveR) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);
                
                // Animación de arma y núcleo
                const core = gunGroup.getObjectByName("energy_core");
                if (core) core.material.opacity = 0.6 + Math.sin(time * 0.005) * 0.2;

                if ((moveF || moveB || moveL || moveR) && !isReloading) {
                    gunGroup.position.y = -0.35 + Math.sin(time * 0.01) * 0.02;
                    gunGroup.position.x = 0.35 + Math.cos(time * 0.005) * 0.01;
                } else if(!isReloading) { gunGroup.position.y = -0.35; gunGroup.position.x = 0.35; }

                applyCollisions(); checkEvents(); playerLight.position.copy(camera.position);

                // Dash daño de Kairos
                if (isDashing) {
                    enemies.forEach(en => { if (camera.position.distanceTo(en.mesh.position) < 4) takeDamage(en, 2, en.mesh.position); });
                }

                // IA Enemiga
                if(arenaLocked) {
                    enemies.forEach(en => {
                        en.mesh.lookAt(camera.position);
                        const dist = camera.position.distanceTo(en.mesh.position);
                        if (dist > 3.0) { en.mesh.translateZ(en.speed * delta); } 
                        else {
                            if (time - en.lastAttack > 800) { 
                                damagePlayer(12); en.lastAttack = time;
                                en.mesh.position.y += 0.5; setTimeout(()=> en.mesh.position.y -= 0.5, 50);
                            }
                        }
                    });
                }

                // Actualizar Partículas
                for(let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.userData.life -= delta;
                    if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); } 
                    else {
                        p.position.add(p.userData.velocity);
                        p.userData.velocity.y -= p.userData.gravity;
                        p.material.opacity = p.userData.life;
                        if(selectedCharacter === 'NOXAR' && Math.random() > 0.8) p.scale.setScalar(Math.random()*1.5);
                    }
                }

                prevTime = time;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
